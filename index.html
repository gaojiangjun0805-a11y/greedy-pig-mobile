<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>贪吃猪</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f9d85e'/%3E%3Ccircle cx='32' cy='32' r='22' fill='%23ff8eb8'/%3E%3Ccircle cx='23' cy='27' r='3' fill='%232b1b32'/%3E%3Ccircle cx='41' cy='27' r='3' fill='%232b1b32'/%3E%3Cellipse cx='32' cy='38' rx='10' ry='7' fill='%23ffbfd4'/%3E%3Ccircle cx='28' cy='38' r='2' fill='%232b1b32'/%3E%3Ccircle cx='36' cy='38' r='2' fill='%232b1b32'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --ink: #473149;
      --muted: #7e687f;
      --panel: rgba(255, 246, 232, .92);
      --panel-strong: rgba(255, 250, 239, .98);
      --line: rgba(102, 72, 74, .16);
      --field: #ead4a6;
      --field-dark: #d4ad78;
      --field-light: #f3dfb7;
      --pink: #f19aa8;
      --pink-strong: #df657e;
      --yellow: #f4cf62;
      --orange: #ef9a51;
      --teal: #8dbd86;
      --blue: #82b3df;
      --danger: #dc5d65;
      --shadow: 0 18px 36px rgba(96, 83, 83, .24);
      --grid-size: 20;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        repeating-linear-gradient(135deg, rgba(255, 255, 255, .2) 0 10px, transparent 10px 38px),
        linear-gradient(160deg, #bfe6f6 0%, #8dcced 56%, #7fc1df 100%);
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .16) 0 2px, transparent 2px 18px),
        repeating-linear-gradient(90deg, rgba(88, 135, 157, .08) 0 1px, transparent 1px 22px);
      opacity: .42;
    }

    button {
      appearance: none;
      min-height: 42px;
      border: 1px solid rgba(120, 77, 65, .16);
      border-radius: 14px;
      color: var(--ink);
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .72), transparent 34%),
        linear-gradient(180deg, #fff0ad, #f0c758);
      box-shadow: 0 7px 0 rgba(188, 139, 77, .36), 0 12px 18px rgba(87, 70, 79, .13), inset 0 2px 0 rgba(255, 255, 255, .55);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 130ms ease, box-shadow 130ms ease, background 130ms ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(188, 139, 77, .3), inset 0 1px 0 rgba(255, 255, 255, .6);
    }

    button:focus-visible {
      outline: 3px solid rgba(79, 142, 232, .55);
      outline-offset: 2px;
    }

    button.primary {
      color: #ffffff;
      border-color: rgba(163, 43, 95, .16);
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .58), transparent 34%),
        linear-gradient(180deg, #ff91a6, #e35f78);
      box-shadow: 0 7px 0 rgba(174, 73, 91, .4), 0 12px 18px rgba(87, 70, 79, .16), inset 0 2px 0 rgba(255, 255, 255, .42);
    }

    button.icon {
      min-width: 44px;
      width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 19px;
      line-height: 1;
    }

    button.speed-button[aria-pressed="true"],
    button.board-button[aria-pressed="true"] {
      color: #ffffff;
      border-color: rgba(24, 123, 114, .28);
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .5), transparent 34%),
        linear-gradient(180deg, #9bc789, #5c9f74);
      box-shadow: 0 6px 0 rgba(72, 116, 89, .34), inset 0 2px 0 rgba(255, 255, 255, .45);
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1220px, 100%);
      height: 100dvh;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      grid-template-rows: minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .stage,
    .side {
      min-width: 0;
      min-height: 0;
      border: 2px solid rgba(255, 250, 239, .9);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 250, 239, .94), rgba(249, 226, 206, .82));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .stage {
      position: relative;
      overflow: hidden;
      padding: 14px;
      display: grid;
      place-items: center;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(242, 154, 168, .2), transparent 25%, transparent 75%, rgba(130, 179, 223, .18)),
        linear-gradient(180deg, rgba(255, 255, 255, .55), rgba(255, 255, 255, 0) 28%);
    }

    .board-shell {
      position: relative;
      width: min(100%, calc(100dvh - 56px));
      max-width: 760px;
      aspect-ratio: 1;
      border: 10px solid #ee9aa6;
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .18), transparent 30%),
        linear-gradient(135deg, #f2ddb2, #e2c489);
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, .38), inset 0 -12px 20px rgba(173, 117, 81, .2), 0 16px 0 rgba(196, 107, 119, .34), 0 26px 38px rgba(85, 72, 82, .24);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .side {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 18%, rgba(255, 255, 255, .72), transparent 32%),
        linear-gradient(145deg, #ffd5dc, #f18a9c);
      border: 2px solid rgba(255, 255, 255, .78);
      box-shadow: 0 7px 0 rgba(202, 112, 123, .32), 0 12px 18px rgba(163, 43, 95, .18);
      font-size: 31px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--pink-strong);
      text-shadow: 0 3px 0 rgba(255, 255, 255, .82), 0 8px 12px rgba(198, 91, 112, .22);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 68px;
      padding: 10px;
      border: 1px solid rgba(120, 77, 65, .1);
      border-radius: 8px;
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, .78), transparent 34%),
        linear-gradient(180deg, rgba(255, 243, 198, .98), rgba(241, 204, 101, .86));
      box-shadow: inset 0 -5px 0 rgba(188, 139, 77, .18), 0 5px 12px rgba(101, 83, 86, .08);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 25px;
      line-height: 1;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .toolbar,
    .choice-row,
    .settings {
      display: grid;
      gap: 8px;
    }

    .toolbar {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .settings {
      gap: 7px;
    }

    .control-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
    }

    .control-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-align: right;
    }

    .choice-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 4px;
      border: 1px solid rgba(120, 77, 65, .1);
      border-radius: 8px;
      background: rgba(255, 250, 239, .66);
    }

    .food-panel {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      border: 1px solid rgba(120, 77, 65, .1);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 250, 239, .94), rgba(250, 230, 205, .78)),
        repeating-linear-gradient(135deg, rgba(130, 179, 223, .08) 0 8px, rgba(241, 154, 168, .08) 8px 16px);
    }

    .food-panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .rank {
      display: grid;
      gap: 8px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 52px;
      padding: 8px;
      border: 1px solid rgba(120, 77, 65, .1);
      border-radius: 8px;
      background: rgba(255, 250, 239, .78);
    }

    .rank-icon {
      width: 42px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background:
        radial-gradient(circle at 28% 18%, rgba(255, 255, 255, .72), transparent 34%),
        linear-gradient(180deg, #fff1b3, #f0cc62);
      font-size: 22px;
      box-shadow: inset 0 -4px 0 rgba(188, 139, 77, .22);
    }

    .rank-name {
      min-width: 0;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.3;
    }

    .rank-items {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .rank-growth {
      min-width: 44px;
      padding: 6px 7px;
      border-radius: 8px;
      background: linear-gradient(180deg, #ff91a7, #df657e);
      color: #ffffff;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      box-shadow: inset 0 -4px 0 rgba(158, 39, 89, .22);
      white-space: nowrap;
    }

    .touch-pad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 42px);
      justify-content: center;
      gap: 7px;
    }

    .board-touch-pad {
      display: none;
    }

    .touch-pad button:nth-child(1) {
      grid-column: 2;
    }

    .touch-pad button:nth-child(2) {
      grid-row: 2;
      grid-column: 1;
    }

    .touch-pad button:nth-child(3) {
      grid-row: 2;
      grid-column: 2;
    }

    .touch-pad button:nth-child(4) {
      grid-row: 2;
      grid-column: 3;
    }

    .touch-pad button:nth-child(1) {
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .62), transparent 34%),
        linear-gradient(180deg, #f48a9d, #d75b72);
      box-shadow: 0 7px 0 rgba(174, 73, 91, .38), 0 12px 18px rgba(87, 70, 79, .13), inset 0 2px 0 rgba(255, 255, 255, .45);
    }

    .touch-pad button:nth-child(2) {
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .7), transparent 34%),
        linear-gradient(180deg, #ffe89c, #e7bb4b);
      box-shadow: 0 7px 0 rgba(188, 139, 77, .36), 0 12px 18px rgba(87, 70, 79, .13), inset 0 2px 0 rgba(255, 255, 255, .52);
    }

    .touch-pad button:nth-child(3) {
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .54), transparent 34%),
        linear-gradient(180deg, #8fb7e5, #5d92ca);
      box-shadow: 0 7px 0 rgba(69, 116, 164, .34), 0 12px 18px rgba(87, 70, 79, .13), inset 0 2px 0 rgba(255, 255, 255, .42);
    }

    .touch-pad button:nth-child(4) {
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, .52), transparent 34%),
        linear-gradient(180deg, #a2c986, #6fa75a);
      box-shadow: 0 7px 0 rgba(82, 126, 70, .34), 0 12px 18px rgba(87, 70, 79, .13), inset 0 2px 0 rgba(255, 255, 255, .42);
    }

    .overlay {
      position: fixed;
      z-index: 7;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(85, 76, 75, .26);
      backdrop-filter: blur(8px);
    }

    .overlay[hidden] {
      display: none;
    }

    .dialog {
      width: min(480px, 100%);
      max-height: 100%;
      overflow: auto;
      padding: 18px;
      border: 2px solid rgba(255, 255, 255, .94);
      border-radius: 8px;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 250, 239, .98), rgba(250, 230, 205, .92)),
        linear-gradient(135deg, rgba(241, 154, 168, .24), rgba(244, 207, 98, .22), rgba(130, 179, 223, .18));
      box-shadow: 0 24px 60px rgba(44, 36, 52, .28);
    }

    .dialog-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .dialog-title span {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background:
        radial-gradient(circle at 30% 18%, rgba(255, 255, 255, .7), transparent 32%),
        linear-gradient(145deg, #ffd5dc, #f18a9c);
      font-size: 30px;
    }

    .dialog h2 {
      margin: 0;
      font-size: 31px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--pink-strong);
    }

    .dialog p {
      margin: 0 0 13px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .last-food {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
        touch-action: manipulation;
      }

      .app {
        min-height: 100dvh;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .stage {
        padding: 8px;
        display: grid;
        grid-template-columns: minmax(0, auto) auto;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      .board-shell {
        width: min(calc(100vw - 132px), calc(100dvh - 44px), 520px);
        min-width: 0;
      }

      .side {
        grid-template-rows: auto auto auto auto;
      }

      .food-panel {
        max-height: 188px;
      }

      .side > .touch-pad {
        display: none;
      }

      .board-touch-pad {
        display: grid;
        width: 98px;
        grid-template-columns: repeat(2, 45px);
        grid-template-rows: repeat(3, 45px);
        gap: 7px;
        padding: 7px;
        border: 1px solid rgba(120, 77, 65, .1);
        border-radius: 8px;
        background: rgba(255, 246, 232, .58);
        box-shadow: 0 8px 18px rgba(87, 70, 79, .12);
      }

      .board-touch-pad button {
        width: 100%;
        min-width: 0;
        min-height: 45px;
      }

      .board-touch-pad button:nth-child(1) {
        grid-row: 1;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(2) {
        grid-row: 2;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(3) {
        grid-row: 3;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(4) {
        grid-row: 2;
        grid-column: 2;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
        gap: 8px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        font-size: 25px;
      }

      h1 {
        font-size: 27px;
      }

      .subtitle,
      .food-panel h2 {
        display: none;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric {
        min-height: 55px;
        padding: 8px 6px;
      }

      .metric strong {
        margin-top: 5px;
        font-size: 19px;
      }

      .toolbar {
        grid-template-columns: repeat(3, 1fr);
      }

      .settings {
        gap: 6px;
      }

      .control-row {
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 6px;
      }

      .control-label {
        font-size: 12px;
      }

      .food-panel {
        display: none;
      }

      .touch-pad {
        grid-template-columns: repeat(3, minmax(54px, 1fr));
        grid-template-rows: repeat(2, 42px);
      }

      .touch-pad button:nth-child(1) {
        grid-row: 1;
        grid-column: 2;
      }

      .touch-pad button:nth-child(2) {
        grid-row: 2;
        grid-column: 1;
      }

      .touch-pad button:nth-child(3) {
        grid-row: 2;
        grid-column: 2;
      }

      .touch-pad button:nth-child(4) {
        grid-row: 2;
        grid-column: 3;
      }

      .dialog {
        padding: 14px;
      }

      .dialog h2 {
        font-size: 26px;
      }

      .dialog-actions {
        grid-template-columns: 1fr;
      }

      .board-touch-pad {
        width: 98px;
        grid-template-columns: repeat(2, 45px);
        grid-template-rows: repeat(3, 45px);
      }

      .board-touch-pad button:nth-child(1) {
        grid-row: 1;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(2) {
        grid-row: 2;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(3) {
        grid-row: 3;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(4) {
        grid-row: 2;
        grid-column: 2;
      }
    }

    @media (max-width: 360px) {
      .stage {
        display: flex;
        flex-direction: column;
      }

      .board-shell {
        width: min(100%, calc(100dvh - 154px));
      }

      .board-touch-pad {
        width: min(100%, 260px);
        grid-template-columns: repeat(3, minmax(54px, 1fr));
        grid-template-rows: repeat(2, 42px);
      }

      .board-touch-pad button:nth-child(1) {
        grid-row: 1;
        grid-column: 2;
      }

      .board-touch-pad button:nth-child(2) {
        grid-row: 2;
        grid-column: 1;
      }

      .board-touch-pad button:nth-child(3) {
        grid-row: 2;
        grid-column: 2;
      }

      .board-touch-pad button:nth-child(4) {
        grid-row: 2;
        grid-column: 3;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="贪吃猪游戏">
    <section class="stage" aria-label="游戏画布">
      <div class="board-shell">
        <canvas id="gameCanvas" width="720" height="720" aria-label="贪吃猪棋盘"></canvas>
      </div>
      <nav class="touch-pad board-touch-pad" aria-label="贴近棋盘的方向控制">
        <button class="icon" type="button" data-dir="up" aria-label="向上">↑</button>
        <button class="icon" type="button" data-dir="left" aria-label="向左">←</button>
        <button class="icon" type="button" data-dir="down" aria-label="向下">↓</button>
        <button class="icon" type="button" data-dir="right" aria-label="向右">→</button>
      </nav>
    </section>

    <aside class="side" aria-label="游戏信息">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">🐽</div>
        <div>
          <h1>贪吃猪</h1>
          <p class="subtitle">猪头前进，卷尾收尾，菜单越放纵增长越快。</p>
        </div>
      </header>

      <section class="metrics" aria-label="分数">
        <div class="metric">
          <span>分数</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="metric">
          <span>长度</span>
          <strong id="lengthText">4</strong>
        </div>
        <div class="metric">
          <span>最高</span>
          <strong id="bestText">0</strong>
        </div>
        <div class="metric">
          <span>下一口</span>
          <strong id="nextText">+0</strong>
        </div>
      </section>

      <section class="food-panel" aria-label="食物增长梯度">
        <h2>食物梯度</h2>
        <div class="rank">
          <div class="rank-row">

              <div class="rank-name">爆表档</div>

  <script>
    (() => {
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreText = document.getElementById("scoreText");
      const lengthText = document.getElementById("lengthText");
      const bestText = document.getElementById("bestText");
      const nextText = document.getElementById("nextText");
      const pauseButton = document.getElementById("pauseButton");
      const restartButton = document.getElementById("restartButton");
      const soundButton = document.getElementById("soundButton");
      const startButton = document.getElementById("startButton");
      const startOverlay = document.getElementById("startOverlay");
      const dialogTitle = document.getElementById("dialogTitle");
      const dialogCopy = document.getElementById("dialogCopy");
      const overlayStat = document.getElementById("overlayStat");
      const speedButtons = [...document.querySelectorAll(".speed-button")];
      const boardButtons = [...document.querySelectorAll(".board-button")];

      const boardSizes = {
        small: 16,
        medium: 20,
        large: 24
      };
      const speeds = {
        slow: 170,
        normal: 132,
        fast: 104
      };
      const foods = [
        { name: "鸡胸肉", icon: "🥩", growth: 1, score: 10, color: "#33b7a7", voice: "audio/chicken-breast.m4a", line: "吃鸡胸肉漏！" },
        { name: "一碗面", icon: "🍜", growth: 1, score: 12, color: "#f9d85e", voice: "audio/noodles.m4a", line: "吃面条漏！" },
        { name: "薯条", icon: "🍟", growth: 2, score: 22, color: "#f58b3b", voice: "audio/fries.m4a", line: "吃薯条漏！" },
        { name: "冰淇淋", icon: "🍦", growth: 2, score: 24, color: "#4f8ee8", voice: "audio/ice-cream.m4a", line: "吃冰淇淋漏！" },
        { name: "小排", icon: "🍖", growth: 2, score: 26, color: "#ec5c91", voice: "audio/ribs.m4a", line: "吃小排漏！" },
        { name: "薯片", icon: "🥔", growth: 3, score: 36, color: "#f9d85e", voice: "audio/chips.m4a", line: "吃薯片漏！" },
        { name: "炸鸡", icon: "🍗", growth: 3, score: 42, color: "#e34b5f", voice: "audio/fried-chicken.m4a", line: "吃炸鸡漏！" }
      ];
      const directions = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      let snake;
      let direction;
      let queuedDirection;
      let food;
      let score;
      let growQueue;
      let lastGrowth;
      let running;
      let paused;
      let gameOver;
      let lastTime;
      let accumulator;
      let gridSize = boardSizes.medium;
      let boardSizeKey = "medium";
      let speedKey = "normal";
      let tile = 1;
      let dpr = 1;
      let best = Number(localStorage.getItem("greedyPigBest") || 0);
      let audioCtx = null;
      let masterGain = null;
      let bgmGain = null;
      let sfxGain = null;
      let bgmTimer = null;
      let voicePlayer = null;
      let muted = false;
      let touchStart = null;

      function resetGame() {
        const mid = Math.floor(gridSize / 2);
        const headX = Math.max(5, Math.floor(gridSize * .32));
        snake = [
          { x: headX, y: mid },
          { x: headX - 1, y: mid },
          { x: headX - 2, y: mid },
          { x: headX - 3, y: mid }
        ];
        direction = directions.right;
        queuedDirection = directions.right;
        score = 0;
        growQueue = 0;
        lastGrowth = 0;
        running = false;
        paused = false;
        gameOver = false;
        lastTime = 0;
        accumulator = 0;
        food = spawnFood({ x: Math.min(gridSize - 3, headX + 5), y: mid });
        updateHud();
        render();
      }

      function startGame() {
        ensureAudio();
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume();
        }
        playBgm();
        if (gameOver) {
          resetGame();
        }
        running = true;
        paused = false;
        gameOver = false;
        lastTime = performance.now();
        accumulator = 0;
        startOverlay.hidden = true;
        pauseButton.textContent = "Ⅱ";
        pauseButton.setAttribute("aria-label", "暂停");
        announceFood(food);
      }

      function showStart() {
        dialogTitle.textContent = "贪吃猪";
        dialogCopy.textContent = "猪头带队，尾巴跟上。食物越不健康，吃完以后身体越长。";
        startButton.textContent = "开始";
        overlayStat.textContent = `最高纪录 ${best}`;
        startOverlay.hidden = false;
      }

      function showGameOver() {
        running = false;
        gameOver = true;
        stopBgm();
        stopSpeech();
        dialogTitle.textContent = "吃撑了";
        dialogCopy.textContent = `本局分数 ${score}，猪身长度 ${snake.length}。`;
        startButton.textContent = "再来一局";
        overlayStat.textContent = food ? `最后目标 ${food.name} +${food.growth}格` : `最高纪录 ${best}`;
        startOverlay.hidden = false;
      }

      function setPaused(nextPaused) {
        if (!running || gameOver) return;
        paused = nextPaused;
        pauseButton.textContent = paused ? "▶" : "Ⅱ";
        pauseButton.setAttribute("aria-label", paused ? "继续" : "暂停");
        if (paused) {
          stopBgm();
          stopSpeech();
        } else {
          lastTime = performance.now();
          playBgm();
          announceFood(food);
        }
      }

      function spawnFood(preferredCell) {
        const openCells = [];
        for (let y = 0; y < gridSize; y += 1) {
          for (let x = 0; x < gridSize; x += 1) {
            if (!snake || !snake.some(part => part.x === x && part.y === y)) {
              openCells.push({ x, y });
            }
          }
        }
        const preferredOpen = preferredCell && openCells.some(cell => cell.x === preferredCell.x && cell.y === preferredCell.y);
        const cell = preferredOpen ? preferredCell : openCells[Math.floor(Math.random() * openCells.length)] || { x: 10, y: 10 };
        const type = foods[Math.floor(Math.random() * foods.length)];
        return { ...cell, ...type };
      }

      function isOpposite(a, b) {
        return a.x + b.x === 0 && a.y + b.y === 0;
      }

      function queueDirection(dirKey) {
        const next = directions[dirKey];
        if (!next || isOpposite(next, direction)) return;
        queuedDirection = next;
      }

      function step() {
        direction = queuedDirection;
        const head = snake[0];
        const nextHead = {
          x: head.x + direction.x,
          y: head.y + direction.y
        };

        const eatsFood = nextHead.x === food.x && nextHead.y === food.y;
        const hitsWall = nextHead.x < 0 || nextHead.y < 0 || nextHead.x >= gridSize || nextHead.y >= gridSize;
        const hitsBody = snake.some((part, index) => {
          const isTailMoving = index === snake.length - 1 && !eatsFood && growQueue === 0;
          return !isTailMoving && part.x === nextHead.x && part.y === nextHead.y;
        });

        if (hitsWall || hitsBody) {
          showGameOver();
          playSfx("crash");
          return;
        }

        snake.unshift(nextHead);
        if (eatsFood) {
          growQueue += food.growth;
          lastGrowth = food.growth;
          score += food.score;
          playSfx("eat", food.growth);
          food = spawnFood();
          announceFood(food);
          if (score > best) {
            best = score;
            localStorage.setItem("greedyPigBest", String(best));
          }
        }

        if (growQueue > 0) {
          growQueue -= 1;
        } else {
          snake.pop();
        }

        updateHud();
      }

      function updateHud() {
        scoreText.textContent = score;
        lengthText.textContent = snake.length;
        bestText.textContent = best;
        nextText.textContent = food ? `+${food.growth}` : "+0";
        overlayStat.textContent = `最高纪录 ${best}`;
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        tile = rect.width / gridSize;
        render();
      }

      function roundRect(context, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        context.beginPath();
        context.moveTo(x + radius, y);
        context.arcTo(x + w, y, x + w, y + h, radius);
        context.arcTo(x + w, y + h, x, y + h, radius);
        context.arcTo(x, y + h, x, y, radius);
        context.arcTo(x, y, x + w, y, radius);
        context.closePath();
      }

      function cellCenter(cell) {
        return {
          x: (cell.x + .5) * tile,
          y: (cell.y + .5) * tile
        };
      }

      function render() {
        if (!ctx || !snake) return;
        const width = canvas.width / dpr;
        const height = canvas.height / dpr;
        ctx.clearRect(0, 0, width, height);
        drawBoard(width, height);
        drawFood();
        drawSnake();
        if (paused && !startOverlay.hidden) return;
        if (paused) drawPauseShade(width, height);
      }

      function drawBoard(width, height) {
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, "#f4dfb7");
        grad.addColorStop(.52, "#ead0a0");
        grad.addColorStop(1, "#d6b37b");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(255,255,255,.12)";
        for (let y = tile * .4; y < height; y += tile * 2) {
          for (let x = tile * .35; x < width; x += tile * 2.2) {
            ctx.beginPath();
            ctx.ellipse(x, y, tile * .08, tile * .035, -.45, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        ctx.strokeStyle = "rgba(125,92,63,.13)";
        ctx.lineWidth = 1;
        for (let i = 1; i < gridSize; i += 1) {
          const p = i * tile;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, height);
          ctx.moveTo(0, p);
          ctx.lineTo(width, p);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(119,78,62,.24)";
        ctx.lineWidth = 3;
        ctx.strokeRect(1.5, 1.5, width - 3, height - 3);
      }

      function drawFood() {
        const center = cellCenter(food);
        const pulse = 1 + Math.sin(performance.now() / 160) * .05;
        ctx.save();
        ctx.translate(center.x, center.y);
        ctx.scale(pulse, pulse);
        ctx.shadowColor = "rgba(74,50,55,.22)";
        ctx.shadowBlur = tile * .18;
        ctx.shadowOffsetY = tile * .1;
        drawClayFood(food.name, Math.max(30, tile * 1.18));
        ctx.restore();
      }

      function drawClayFood(name, size) {
        const s = size;
        ctx.save();
        ctx.lineWidth = Math.max(1, s * .045);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (name === "薯条") {
          ctx.strokeStyle = "#d88935";
          ctx.fillStyle = "#f6d35b";
          [-.22, -.08, .06, .2].forEach((x, i) => {
            roundRect(ctx, x * s, (-.48 + i * .02) * s, s * .1, s * .56, s * .04);
            ctx.fill();
            ctx.stroke();
          });
          ctx.fillStyle = "#d94f52";
          ctx.strokeStyle = "#b94749";
          roundRect(ctx, -s * .35, -s * .06, s * .7, s * .48, s * .12);
          ctx.fill();
          ctx.stroke();
        } else if (name === "薯片") {
          ctx.strokeStyle = "#d39a40";
          for (let i = 0; i < 4; i += 1) {
            const x = (-.24 + i * .16) * s;
            const y = (i % 2 ? -.03 : .05) * s;
            const grad = ctx.createRadialGradient(x - s * .08, y - s * .08, s * .02, x, y, s * .2);
            grad.addColorStop(0, "#ffe793");
            grad.addColorStop(1, "#e7b84a");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(x, y, s * .2, s * .26, .55, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          }
        } else if (name === "一碗面") {
          ctx.fillStyle = "#f3f1e6";
          ctx.strokeStyle = "#c99a61";
          roundRect(ctx, -s * .42, -s * .06, s * .84, s * .44, s * .16);
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = "#d8a146";
          for (let i = 0; i < 4; i += 1) {
            ctx.beginPath();
            ctx.moveTo((-s * .28) + i * s * .18, -s * .02);
            ctx.bezierCurveTo(-s * .16 + i * s * .18, -s * .14, -s * .05 + i * s * .18, s * .11, s * .08 + i * s * .12, s * .02);
            ctx.stroke();
          }
          ctx.fillStyle = "#7dbb66";
          ctx.beginPath();
          ctx.arc(s * .22, -s * .12, s * .08, 0, Math.PI * 2);
          ctx.fill();
        } else if (name === "冰淇淋") {
          ctx.fillStyle = "#d99b55";
          ctx.strokeStyle = "#b77a45";
          ctx.beginPath();
          ctx.moveTo(-s * .24, s * .1);
          ctx.lineTo(s * .24, s * .1);
          ctx.lineTo(0, s * .5);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          const grad = ctx.createRadialGradient(-s * .12, -s * .18, s * .04, 0, -s * .1, s * .36);
          grad.addColorStop(0, "#fff6ff");
          grad.addColorStop(1, "#ff9ed0");
          ctx.fillStyle = grad;
          ctx.strokeStyle = "#dd78a8";
          ctx.beginPath();
          ctx.arc(0, -s * .12, s * .31, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        } else if (name === "小排") {
          ctx.strokeStyle = "#b74e45";
          ctx.fillStyle = "#d96b5d";
          roundRect(ctx, -s * .34, -s * .2, s * .68, s * .45, s * .2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#fff1d5";
          ctx.strokeStyle = "#d5b98d";
          ctx.beginPath();
          ctx.arc(-s * .38, -s * .23, s * .12, 0, Math.PI * 2);
          ctx.arc(-s * .5, -s * .12, s * .1, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        } else {
          ctx.fillStyle = name === "炸鸡" ? "#c87334" : "#e68665";
          ctx.strokeStyle = name === "炸鸡" ? "#a85c2d" : "#c06350";
          ctx.beginPath();
          ctx.ellipse(s * .08, s * .06, s * .3, s * .42, -.72, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#fff1d5";
          ctx.strokeStyle = "#d5b98d";
          ctx.lineWidth = Math.max(1, s * .055);
          ctx.beginPath();
          ctx.moveTo(-s * .18, -s * .2);
          ctx.lineTo(-s * .38, -s * .38);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(-s * .42, -s * .42, s * .11, 0, Math.PI * 2);
          ctx.arc(-s * .31, -s * .48, s * .09, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(255,255,255,.3)";
        ctx.beginPath();
        ctx.ellipse(-s * .13, -s * .18, s * .12, s * .045, -.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawSnake() {
        for (let i = snake.length - 1; i >= 0; i -= 1) {
          if (i === 0) {
            drawPigHead(snake[i]);
          } else if (i === snake.length - 1) {
            drawPigTail(snake[i], snake[i - 1], i);
          } else {
            drawBodySegment(snake[i], i);
          }
        }
      }

      function drawBodySegment(part, index) {
        const center = cellCenter(part);
        const wobble = Math.sin(performance.now() / 180 + index * .6) * tile * .03;
        ctx.save();
        ctx.translate(center.x + wobble, center.y);
        ctx.fillStyle = index % 2 === 0 ? "#ff9cc0" : "#ffb2cb";
        ctx.strokeStyle = "rgba(163,43,95,.2)";
        ctx.lineWidth = Math.max(1, tile * .04);
        roundRect(ctx, -tile * .39, -tile * .34, tile * .78, tile * .68, tile * .22);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,.28)";
        roundRect(ctx, -tile * .25, -tile * .22, tile * .5, tile * .14, tile * .07);
        ctx.fill();
        ctx.restore();
      }

      function drawPigTail(part, previous, index) {
        drawBodySegment(part, index);
        const center = cellCenter(part);
        const angle = Math.atan2(part.y - previous.y, part.x - previous.x);
        ctx.save();
        ctx.translate(center.x, center.y);
        ctx.rotate(angle);
        ctx.strokeStyle = "#ec5c91";
        ctx.lineWidth = Math.max(3, tile * .11);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(tile * .2, 0);
        ctx.bezierCurveTo(tile * .55, -tile * .18, tile * .55, tile * .2, tile * .33, tile * .21);
        ctx.bezierCurveTo(tile * .13, tile * .22, tile * .14, -tile * .04, tile * .34, -tile * .04);
        ctx.stroke();
        ctx.restore();
      }

      function drawPigHead(part) {
        const center = cellCenter(part);
        const angle = Math.atan2(direction.y, direction.x);
        ctx.save();
        ctx.translate(center.x, center.y);
        ctx.rotate(angle);
        ctx.shadowColor = "rgba(42,33,50,.18)";
        ctx.shadowBlur = tile * .16;
        ctx.shadowOffsetY = tile * .07;

        ctx.fillStyle = "#ff8eb8";
        ctx.strokeStyle = "rgba(126,44,80,.24)";
        ctx.lineWidth = Math.max(1, tile * .04);
        ctx.beginPath();
        ctx.ellipse(0, 0, tile * .47, tile * .41, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#ff76a7";
        ctx.beginPath();
        ctx.ellipse(-tile * .18, -tile * .35, tile * .15, tile * .22, -.45, 0, Math.PI * 2);
        ctx.ellipse(-tile * .18, tile * .35, tile * .15, tile * .22, .45, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "transparent";
        ctx.fillStyle = "#2a2132";
        ctx.beginPath();
        ctx.arc(tile * .09, -tile * .16, tile * .045, 0, Math.PI * 2);
        ctx.arc(tile * .09, tile * .16, tile * .045, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffc0d5";
        ctx.beginPath();
        ctx.ellipse(tile * .26, 0, tile * .18, tile * .24, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#2a2132";
        ctx.beginPath();
        ctx.arc(tile * .31, -tile * .075, tile * .035, 0, Math.PI * 2);
        ctx.arc(tile * .31, tile * .075, tile * .035, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawPauseShade(width, height) {
        ctx.save();
        ctx.fillStyle = "rgba(42,33,50,.28)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "rgba(255,255,255,.92)";
        roundRect(ctx, width / 2 - 62, height / 2 - 26, 124, 52, 8);
        ctx.fill();
        ctx.fillStyle = "#2a2132";
        ctx.font = '900 20px "PingFang SC", sans-serif';
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("暂停", width / 2, height / 2);
        ctx.restore();
      }

      function loop(now) {
        if (!lastTime) lastTime = now;
        const delta = now - lastTime;
        lastTime = now;
        if (running && !paused && !gameOver) {
          accumulator += delta;
          const interval = speeds[speedKey];
          while (accumulator >= interval) {
            step();
            accumulator -= interval;
          }
        }
        render();
        requestAnimationFrame(loop);
      }

      function ensureAudio() {
        if (audioCtx) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        audioCtx = new AudioContext();
        masterGain = audioCtx.createGain();
        bgmGain = audioCtx.createGain();
        sfxGain = audioCtx.createGain();
        voicePlayer = new Audio();
        voicePlayer.preload = "auto";
        voicePlayer.volume = .9;
        voicePlayer.playbackRate = 1.12;
        masterGain.gain.value = muted ? 0 : 1;
        bgmGain.gain.value = .045;
        sfxGain.gain.value = .16;
        bgmGain.connect(masterGain);
        sfxGain.connect(masterGain);
        masterGain.connect(audioCtx.destination);
      }

      function playTone(destination, frequency, duration, type, startOffset = 0, gainValue = .5) {
        if (!audioCtx || muted) return;
        const start = audioCtx.currentTime + startOffset;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(gainValue, start + .02);
        gain.gain.exponentialRampToValueAtTime(.001, start + duration);
        osc.connect(gain);
        gain.connect(destination);
        osc.start(start);
        osc.stop(start + duration + .04);
      }

      function playBgm() {
        if (!audioCtx || bgmTimer || muted) return;
        const notes = [262, 330, 392, 330, 294, 349, 440, 392];
        let index = 0;
        bgmTimer = window.setInterval(() => {
          playTone(bgmGain, notes[index % notes.length], .22, "triangle", 0, .42);
          playTone(bgmGain, notes[(index + 2) % notes.length] / 2, .28, "sine", .01, .24);
          index += 1;
        }, 320);
      }

      function stopBgm() {
        if (!bgmTimer) return;
        window.clearInterval(bgmTimer);
        bgmTimer = null;
      }

      function playSfx(kind, growth = 1) {
        if (!audioCtx || muted) return;
        if (kind === "eat") {
          playTone(sfxGain, 520 + growth * 90, .11, "square", 0, .32);
          playTone(sfxGain, 720 + growth * 80, .12, "triangle", .08, .26);
        } else {
          playTone(sfxGain, 180, .18, "sawtooth", 0, .28);
          playTone(sfxGain, 92, .24, "sine", .09, .24);
        }
      }

      function duckBgm(shouldDuck) {
        if (!audioCtx || !bgmGain) return;
        bgmGain.gain.cancelScheduledValues(audioCtx.currentTime);
        bgmGain.gain.setTargetAtTime(shouldDuck ? .012 : .045, audioCtx.currentTime, .04);
      }

      function stopSpeech() {
        if (voicePlayer) {
          voicePlayer.pause();
          voicePlayer.removeAttribute("src");
          voicePlayer.load();
        }
        duckBgm(false);
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
      }

      function speakWithBrowserVoice(phrase) {
        if (!("speechSynthesis" in window) || !window.SpeechSynthesisUtterance) {
          return;
        }
        const utterance = new window.SpeechSynthesisUtterance(phrase);
        utterance.lang = "zh-CN";
        utterance.rate = 1.28;
        utterance.pitch = 1.28;
        utterance.volume = .9;
        window.speechSynthesis.speak(utterance);
      }

      function announceFood(targetFood) {
        if (muted || !running || paused || gameOver || !targetFood) {
          return;
        }
        const phrase = targetFood.line || `吃${targetFood.name}漏！`;
        stopSpeech();
        if (targetFood.voice && voicePlayer) {
          voicePlayer.src = targetFood.voice;
          voicePlayer.volume = .9;
          voicePlayer.playbackRate = 1.12;
          voicePlayer.onended = () => duckBgm(false);
          voicePlayer.onerror = () => {
            duckBgm(false);
            speakWithBrowserVoice(phrase);
          };
          duckBgm(true);
          const playResult = voicePlayer.play();
          if (playResult && typeof playResult.catch === "function") {
            playResult.catch(() => {
              duckBgm(false);
              speakWithBrowserVoice(phrase);
            });
          }
          return;
        }
        speakWithBrowserVoice(phrase);
      }

      function toggleSound() {
        ensureAudio();
        muted = !muted;
        if (masterGain) masterGain.gain.value = muted ? 0 : 1;
        soundButton.textContent = muted ? "×" : "♪";
        soundButton.setAttribute("aria-label", muted ? "打开声音" : "关闭声音");
        if (muted) {
          stopBgm();
          stopSpeech();
        } else if (running && !paused && !gameOver) {
          playBgm();
          announceFood(food);
        }
      }

      function setSpeed(nextSpeed) {
        speedKey = nextSpeed;
        speedButtons.forEach(button => {
          button.setAttribute("aria-pressed", button.dataset.speed === speedKey ? "true" : "false");
        });
      }

      function syncBoardSizeControls() {
        document.documentElement.style.setProperty("--grid-size", String(gridSize));
        boardButtons.forEach(button => {
          button.setAttribute("aria-pressed", button.dataset.boardSize === boardSizeKey ? "true" : "false");
        });
      }

      function setBoardSize(nextSizeKey) {
        if (!boardSizes[nextSizeKey] || nextSizeKey === boardSizeKey) return;
        boardSizeKey = nextSizeKey;
        gridSize = boardSizes[boardSizeKey];
        syncBoardSizeControls();
        stopBgm();
        stopSpeech();
        resetGame();
        showStart();
        resizeCanvas();
      }

      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("keydown", event => {
        const keyMap = {
          ArrowUp: "up",
          KeyW: "up",
          ArrowDown: "down",
          KeyS: "down",
          ArrowLeft: "left",
          KeyA: "left",
          ArrowRight: "right",
          KeyD: "right"
        };
        if (keyMap[event.code]) {
          event.preventDefault();
          queueDirection(keyMap[event.code]);
        } else if (event.code === "Space") {
          event.preventDefault();
          if (startOverlay.hidden) {
            setPaused(!paused);
          } else {
            startGame();
          }
        }
      }, { passive: false });

      canvas.addEventListener("pointerdown", event => {
        const rect = canvas.getBoundingClientRect();
        touchStart = {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      });

      canvas.addEventListener("pointerup", event => {
        if (!touchStart) return;
        const rect = canvas.getBoundingClientRect();
        const dx = event.clientX - rect.left - touchStart.x;
        const dy = event.clientY - rect.top - touchStart.y;
        touchStart = null;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 18) return;
        if (Math.abs(dx) > Math.abs(dy)) {
          queueDirection(dx > 0 ? "right" : "left");
        } else {
          queueDirection(dy > 0 ? "down" : "up");
        }
      });

      document.querySelectorAll("[data-dir]").forEach(button => {
        button.addEventListener("click", () => queueDirection(button.dataset.dir));
      });

      speedButtons.forEach(button => {
        button.addEventListener("click", () => setSpeed(button.dataset.speed));
      });

      boardButtons.forEach(button => {
        button.addEventListener("click", () => setBoardSize(button.dataset.boardSize));
      });

      startButton.addEventListener("click", startGame);
      pauseButton.addEventListener("click", () => setPaused(!paused));
      restartButton.addEventListener("click", () => {
        stopBgm();
        stopSpeech();
        resetGame();
        showStart();
      });
      soundButton.addEventListener("click", toggleSound);

      syncBoardSizeControls();
      setSpeed(speedKey);
      resetGame();
      showStart();
      resizeCanvas();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
